<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetAI Sport Analytics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <h2 class="logo">BetAI Analytics</h2>

        <nav class="menu">
          <button class="menu-item active" data-sport="football">Football réel</button>
          <button class="menu-item" data-sport="basket">Basket</button>
          <button class="menu-item" data-sport="tennis">Tennis</button>
          <button class="menu-item" data-sport="tt">Tennis de table</button>
        </nav>
      </div>

      <div class="sidebar-user">
        <p>Connecté :</p>
        <strong>admin@betai.com</strong>
        <p>Mode : analyse sportive</p>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Football réel</h1>
          <p class="sub">Gestion et analyse des résultats sportifs</p>
        </div>
        <div class="top-actions">
          <button class="secondary-btn" id="exportBtn">Exporter JSON</button>
          <button class="primary-btn" id="loadDemoBtn">Charger démo</button>
        </div>
      </header>

      <section class="stats">
        <div class="stat-box">
          <span>Total matchs</span>
          <strong id="statTotal">0</strong>
        </div>
        <div class="stat-box">
          <span>Score moyen</span>
          <strong id="statAvg">0</strong>
        </div>
        <div class="stat-box">
          <span>BTTS Oui</span>
          <strong id="statBtts">0</strong>
        </div>
        <div class="stat-box">
          <span>Indice fort</span>
          <strong id="statStrong">0</strong>
        </div>
      </section>

      <section class="content">
        <section class="left-panel">
          <div class="panel-header">
            <h2>Matchs disponibles</h2>
            <input type="text" id="searchInput" placeholder="Rechercher un match..." />
          </div>

          <div id="matchList" class="match-list"></div>
        </section>

        <aside class="right-panel">
          <div class="form-card">
            <h2>Ajouter un match</h2>

            <input id="homeTeam" placeholder="Équipe / Joueur domicile" />
            <input id="awayTeam" placeholder="Équipe / Joueur extérieur" />
            <input id="finalScore" placeholder="Score final (ex: 2-1)" />
            <input id="halfScore" placeholder="Score mi-temps / set 1 (ex: 1-0)" />
            <input id="shots" placeholder="Tirs cadrés / stats optionnelles" />
            <input id="corners" placeholder="Corners / stats optionnelles" />
            <textarea id="notes" placeholder="Notes / description"></textarea>
            <input id="supplierLink" placeholder="Lien source / match / capture" />
            <input type="file" id="matchImage" accept="image/*" />

            <div class="form-actions">
              <button class="primary-btn" id="saveBtn">Enregistrer</button>
              <button class="secondary-btn" id="clearBtn">Annuler</button>
            </div>
          </div>

          <div class="form-card">
            <h2>Importer données</h2>
            <input type="file" id="importJson" accept=".json" />
            <p class="hint">Importe un fichier JSON de matchs pour le sport actif.</p>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
