<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetAI Analytics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <h1>BetAI<br>Analytics</h1>
    <nav>
      <button class="nav-btn active" data-sport="football">Football réel</button>
      <button class="nav-btn" data-sport="basket">Basket</button>
      <button class="nav-btn" data-sport="tennis">Tennis</button>
      <button class="nav-btn" data-sport="table_tennis">Tennis de table</button>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h2 id="pageTitle">Football réel</h2>
        <p class="subtitle">Analyse sportive avancée et projection statistique</p>
      </div>
      <button id="loadDemoBtn">Charger démo</button>
    </div>

    <section class="panel form-panel">
      <h3>Analyser un match</h3>
      <div class="grid">
        <div>
          <label>Sport</label>
          <select id="sport">
            <option value="football">Football</option>
            <option value="basket">Basket</option>
            <option value="tennis">Tennis</option>
            <option value="table_tennis">Tennis de table</option>
          </select>
        </div>
        <div>
          <label>Équipe domicile</label>
          <input id="home" placeholder="Ex: Real Madrid" />
        </div>
        <div>
          <label>Équipe extérieur</label>
          <input id="away" placeholder="Ex: Sevilla" />
        </div>
      </div>
      <button id="analyzeBtn">Analyser le match</button>
    </section>

    <section class="panel result-panel">
      <h3>Résultat intelligent</h3>
      <div id="resultEmpty">Aucune analyse pour le moment.</div>
      <div id="resultCard" class="hidden"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
